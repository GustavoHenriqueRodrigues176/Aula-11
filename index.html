<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja de Livros</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Meu Site</h1>
  </header>

  <main>
    <section id="catalogo">
      <h2>Catálogo de Livros</h2>
      <div id="lista-livros"></div>
    </section>

    <aside id="carrinho">
      <h2>Meu Carrinho</h2>
      <ul id="itens-carrinho"></ul>

      <p>Total: R$ <span id="valor-total">0.00</span></p>

      <button id="btn-limpar">Esvaziar Carrinho</button>
      <button id="btn-finalizar">Finalizar Compra</button>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
